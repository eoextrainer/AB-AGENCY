databases:
  - name: ab-agency-db
    plan: starter
    databaseName: ab_agency
    user: ab_agency

services:
  - type: web
    name: ab-agency-backend
    runtime: python
    rootDir: backend
    plan: starter
    healthCheckPath: /health
    buildCommand: pip install --no-cache-dir -r requirements.txt
    startCommand: bash -lc 'alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port ${PORT}'
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: ab-agency-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ENVIRONMENT
        value: production
      - key: FIRST_SUPERUSER_EMAIL
        value: admin@ab-agency.com
      - key: FIRST_SUPERUSER_USERNAME
        value: admin
      - key: FIRST_SUPERUSER_PASSWORD
        sync: false
      - key: ARTIST_AMBRE_PASSWORD
        sync: false
      - key: ARTIST_CELESTE_PASSWORD
        sync: false
      - key: ARTIST_SANTIAGO_PASSWORD
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: CMS_PROJECT_ID
        value: replace-me
      - key: CMS_DATASET
        value: production
      - key: CMS_API_VERSION
        value: 2025-01-01

  - type: web
    name: ab-agency-frontend
    runtime: node
    rootDir: frontend
    plan: starter
    healthCheckPath: /
    buildCommand: npm install && npm run build
    startCommand: npx next start -H 0.0.0.0 -p ${PORT}
    envVars:
      - key: NEXT_PUBLIC_API_BASE_URL
        sync: false
      - key: NEXT_SERVER_API_BASE_URL
        sync: false
      - key: NEXT_PUBLIC_SANITY_PROJECT_ID
        value: replace-me
      - key: NEXT_PUBLIC_SANITY_DATASET
        value: production
      - key: NEXT_PUBLIC_SANITY_API_VERSION
        value: 2025-01-01
      - key: ADMIN_API_USERNAME
        value: admin
      - key: ADMIN_API_PASSWORD
        sync: false
      - key: NEXT_PUBLIC_SHOW_DEMO_CREDENTIALS
        value: "false"