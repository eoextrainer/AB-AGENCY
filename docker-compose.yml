services:
  db:
    image: postgres:16-alpine
    container_name: ab-agency-db
    environment:
      POSTGRES_DB: ab_agency
      POSTGRES_USER: ab_agency
      POSTGRES_PASSWORD: ab_agency
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ab_agency -d ab_agency"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
    container_name: ab-agency-backend
    environment:
      DATABASE_URL: postgresql+psycopg://ab_agency:ab_agency@db:5432/ab_agency
      SECRET_KEY: change-me-in-production
      FIRST_SUPERUSER_EMAIL: admin@ab-agency.com
      FIRST_SUPERUSER_PASSWORD: admin12345
      CORS_ORIGINS: '["http://localhost:3000","http://frontend:3000"]'
    command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    container_name: ab-agency-frontend
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000/api
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data: